    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      (function () {
        const cards = Array.from(document.querySelectorAll(".post-card[data-cat]"));
        const catBtns = Array.from(document.querySelectorAll(".cat-btn"));
        const isHomepage = cards.length > 0;

        if (isHomepage) {
          const searchInput = document.getElementById("search-input");
          const monthSelect = document.getElementById("filter-month");
          const yearSelect = document.getElementById("filter-year");
          const noResults = document.getElementById("no-results");
          const seriesStrip = document.getElementById("series-strip");

          let activeCat = "", activeMonth = "", activeYear = "", searchTerm = "";

          const months = new Set();
          const years = new Set();
          cards.forEach(c => {
            if (c.dataset.month) months.add(c.dataset.month);
            if (c.dataset.year) years.add(c.dataset.year);
          });

          const arMonths = {
            "01": "يناير", "02": "فبراير", "03": "مارس", "04": "أبريل",
            "05": "مايو", "06": "يونيو", "07": "يوليو", "08": "أغسطس",
            "09": "سبتمبر", "10": "أكتوبر", "11": "نوفمبر", "12": "ديسمبر"
          };

          Array.from(months).sort().forEach(m => {
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = arMonths[m] || m;
            monthSelect.appendChild(opt);
          });

          Array.from(years).sort().reverse().forEach(y => {
            const opt = document.createElement("option");
            opt.value = y;
            opt.textContent = y;
            yearSelect.appendChild(opt);
          });

          function applyFilters() {
            let visible = 0;
            cards.forEach(card => {
              const matchCat = !activeCat || card.dataset.cat.trim() === activeCat.trim();
              const matchMonth = !activeMonth || card.dataset.month === activeMonth;
              const matchYear = !activeYear || card.dataset.year === activeYear;
              const matchSearch = !searchTerm || card.dataset.title.includes(searchTerm) || card.dataset.desc.includes(searchTerm);
              const show = matchCat && matchMonth && matchYear && matchSearch;
              card.classList.toggle("hidden", !show);
              if (show) visible++;
            });

            if (noResults) {
              noResults.style.display = visible === 0 ? "block" : "none";
            }

            if (seriesStrip) {
              seriesStrip.style.display = activeCat ? "none" : "";
            }
          }

          function setActiveCategory(cat) {
            activeCat = cat;
            catBtns.forEach(b => {
              b.classList.toggle("active", b.dataset.cat.trim() === cat.trim());
            });
            applyFilters();
          }

          catBtns.forEach(btn => {
            btn.addEventListener("click", () => setActiveCategory(btn.dataset.cat.trim()));
          });

          monthSelect.addEventListener("change", () => {
            activeMonth = monthSelect.value;
            applyFilters();
          });

          yearSelect.addEventListener("change", () => {
            activeYear = yearSelect.value;
            applyFilters();
          });

          searchInput.addEventListener("input", () => {
            searchTerm = searchInput.value.trim();
            applyFilters();
          });

          const urlParams = new URLSearchParams(window.location.search);
          const catParam = urlParams.get("cat");
          if (catParam) {
            setActiveCategory(catParam);
            history.replaceState(null, "", window.location.pathname);
          }
        } else {
          catBtns.forEach(btn => {
            btn.addEventListener("click", () => {
              const cat = btn.dataset.cat.trim();
              window.location.href = cat ? "/?cat=" + encodeURIComponent(cat) : "/";
            });
          });
        }
      })();
    </script>
