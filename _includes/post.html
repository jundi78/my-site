---
layout: base.html
---

<div class="container">
  <article class="article">
    <header class="article-header">
      <p class="kicker">
        {{ date | date }}
        {%- if category %} — <span class="post-cat-tag">{{ category }}</span>{%- endif %}
      </p>
      <h1>{{ title }}</h1>
    </header>

    {%- if thumbnail %}
      <img class="article-thumb" src="{{ thumbnail }}" alt="{{ title }}" />
    {%- endif %}

    {{ content | safe }}
  </article>
</div>
