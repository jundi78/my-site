<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif+Arabic:wght@300;400;700&family=IBM+Plex+Sans+Arabic:wght@400;600&family=Noto+Naskh+Arabic:wght@400;500&family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <style>
      :root {
        --bg:              {{ theme.color_bg }};
        --text:            {{ theme.color_text }};
        --muted:           {{ theme.color_muted }};
        --hint:            {{ theme.color_hint }};
        --line:            {{ theme.color_line }};
        --soft:            {{ theme.color_soft }};
        --accent:          {{ theme.color_accent }};
        --font-body:       "{{ theme.font_body }}", "Amiri", serif;
        --font-ui:         "{{ theme.font_ui }}", "IBM Plex Sans Arabic", sans-serif;
        --font-size-base:  {{ theme.font_size_base }}px;
        --max-width:       {{ theme.max_width }}px;
        --spacing-section: {{ theme.spacing_section }}px;
      }
    </style>
  </head>
  <body>

    <header class="site-header">
      <div class="container">

        <div class="topbar-main">
          <a class="brand" href="/">{{ theme.site_name }}</a>
          <div class="topbar-controls">
            <select class="date-select" id="filter-month" aria-label="تصفّح بالشهر">
              <option value="">الشهر</option>
            </select>
            <select class="date-select" id="filter-year" aria-label="تصفّح بالسنة">
              <option value="">السنة</option>
            </select>
            <input class="search-input" id="search-input" type="search" placeholder="ابحث في التدوينات…" aria-label="بحث" />
          </div>
        </div>

        <div class="catbar">
          <span class="catbar-label">التصنيفات</span>
          <button class="cat-btn active" data-cat="">الكل</button>
          {%- for cat in theme.categories %}
            <button class="cat-btn" data-cat="{{ cat | trim }}">{{ cat | trim }}</button>
          {%- endfor %}
        </div>

      </div>
    </header>

    <main>
      {{ content | safe }}
    </main>

    <div class="container">
      <footer class="site-footer">
        © <span id="year"></span> — {{ theme.footer_text }}
      </footer>
    </div>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      (function () {
        const cards   = Array.from(document.querySelectorAll(".post-card[data-cat]"));
        const catBtns = Array.from(document.querySelectorAll(".cat-btn"));
        const isHomepage = cards.length > 0;

        // ── HOMEPAGE MODE ──────────────────────────────────────────────
        if (isHomepage) {
          const searchInput = document.getElementById("search-input");
          const monthSelect = document.getElementById("filter-month");
          const yearSelect  = document.getElementById("filter-year");
          const noResults   = document.getElementById("no-results");

          let activeCat = "", activeMonth = "", activeYear = "", searchTerm = "";

          // Populate month/year dropdowns
          const months = new Set();
          const years  = new Set();
          cards.forEach(c => {
            if (c.dataset.month) months.add(c.dataset.month);
            if (c.dataset.year)  years.add(c.dataset.year);
          });

          const arMonths = {
            "01":"يناير","02":"فبراير","03":"مارس","04":"أبريل",
            "05":"مايو","06":"يونيو","07":"يوليو","08":"أغسطس",
            "09":"سبتمبر","10":"أكتوبر","11":"نوفمبر","12":"ديسمبر"
          };

          Array.from(months).sort().forEach(m => {
            const opt = document.createElement("option");
            opt.value = m; opt.textContent = arMonths[m] || m;
            monthSelect.appendChild(opt);
          });

          Array.from(years).sort().reverse().forEach(y => {
            const opt = document.createElement("option");
            opt.value = y; opt.textContent = y;
            yearSelect.appendChild(opt);
          });

          function applyFilters() {
            let visible = 0;
            cards.forEach(card => {
              const matchCat    = !activeCat   || card.dataset.cat.trim()   === activeCat.trim();
              const matchMonth  = !activeMonth || card.dataset.month === activeMonth;
              const matchYear   = !activeYear  || card.dataset.year  === activeYear;
              const matchSearch = !searchTerm  || card.dataset.title.includes(searchTerm)
                                               || card.dataset.desc.includes(searchTerm);
              const show = matchCat && matchMonth && matchYear && matchSearch;
              card.classList.toggle("hidden", !show);
              if (show) visible++;
            });
            if (noResults) noResults.style.display = visible === 0 ? "block" : "none";
          }

          function setActiveCategory(cat) {
            activeCat = cat;
            catBtns.forEach(b => {
              b.classList.toggle("active", b.dataset.cat.trim() === cat.trim());
            });
            applyFilters();
          }

          // Wire up category buttons
          catBtns.forEach(btn => {
            btn.addEventListener("click", () => {
              setActiveCategory(btn.dataset.cat.trim());
            });
          });

          monthSelect.addEventListener("change", () => { activeMonth = monthSelect.value; applyFilters(); });
          yearSelect.addEventListener("change",  () => { activeYear  = yearSelect.value;  applyFilters(); });
          searchInput.addEventListener("input",  () => { searchTerm  = searchInput.value.trim(); applyFilters(); });

          // If arriving from a post page with ?cat=, activate that category
          const urlParams = new URLSearchParams(window.location.search);
          const catParam  = urlParams.get("cat");
          if (catParam) {
            setActiveCategory(catParam);
            // Clean the URL without reloading
            history.replaceState(null, "", window.location.pathname);
          }

        // ── POST PAGE MODE ─────────────────────────────────────────────
        } else {
          // Category buttons navigate back to homepage filtered by category
          catBtns.forEach(btn => {
            btn.addEventListener("click", () => {
              const cat = btn.dataset.cat.trim();
              if (cat) {
                window.location.href = "/?cat=" + encodeURIComponent(cat);
              } else {
                window.location.href = "/";
              }
            });
          });
        }

      })();
    </script>
  </body>
</html>
