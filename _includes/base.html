<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container">

        <!-- Row 1: brand + search + date -->
        <div class="topbar-main">
          <a class="brand" href="/">مدوّنتي</a>
          <div class="topbar-controls">
            <select class="date-select" id="filter-month" aria-label="تصفّح بالشهر">
              <option value="">الشهر</option>
            </select>
            <select class="date-select" id="filter-year" aria-label="تصفّح بالسنة">
              <option value="">السنة</option>
            </select>
            <input class="search-input" id="search-input" type="search" placeholder="ابحث في التدوينات…" aria-label="بحث" />
          </div>
        </div>

        <!-- Row 2: categories -->
        <div class="catbar">
          <span class="catbar-label">التصنيفات</span>
          <button class="cat-btn active" data-cat="">الكل</button>
          <button class="cat-btn" data-cat="دين">دين</button>
          <button class="cat-btn" data-cat="سياسة">سياسة</button>
          <button class="cat-btn" data-cat="علوم">علوم</button>
          <button class="cat-btn" data-cat="تاريخ">تاريخ</button>
          <button class="cat-btn" data-cat="متفرقات">متفرقات</button>
        </div>

      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <div class="container">
      <footer class="site-footer">
        © <span id="year"></span> — مدوّنتي
      </footer>
    </div>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      // ── Filter engine ──────────────────────────────────────────
      // Runs on homepage only (cards exist). Safe to run on all pages.
      (function () {
        const cards = Array.from(document.querySelectorAll(".post-card[data-cat]"));
        if (!cards.length) return;

        const searchInput  = document.getElementById("search-input");
        const monthSelect  = document.getElementById("filter-month");
        const yearSelect   = document.getElementById("filter-year");
        const catBtns      = Array.from(document.querySelectorAll(".cat-btn"));
        const noResults    = document.getElementById("no-results");

        let activeCat  = "";
        let activeMonth = "";
        let activeYear  = "";
        let searchTerm  = "";

        // Populate month/year dropdowns from card data
        const months = new Set();
        const years  = new Set();
        cards.forEach(c => {
          if (c.dataset.month) months.add(c.dataset.month);
          if (c.dataset.year)  years.add(c.dataset.year);
        });

        // Arabic month names
        const arMonths = {
          "01":"يناير","02":"فبراير","03":"مارس","04":"أبريل",
          "05":"مايو","06":"يونيو","07":"يوليو","08":"أغسطس",
          "09":"سبتمبر","10":"أكتوبر","11":"نوفمبر","12":"ديسمبر"
        };

        Array.from(months).sort().forEach(m => {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = arMonths[m] || m;
          monthSelect.appendChild(opt);
        });

        Array.from(years).sort().reverse().forEach(y => {
          const opt = document.createElement("option");
          opt.value = y;
          opt.textContent = y;
          yearSelect.appendChild(opt);
        });

        function applyFilters() {
          let visible = 0;
          cards.forEach(card => {
            const matchCat    = !activeCat  || card.dataset.cat   === activeCat;
            const matchMonth  = !activeMonth || card.dataset.month === activeMonth;
            const matchYear   = !activeYear  || card.dataset.year  === activeYear;
            const matchSearch = !searchTerm  || card.dataset.title.includes(searchTerm)
                                              || card.dataset.desc.includes(searchTerm);
            const show = matchCat && matchMonth && matchYear && matchSearch;
            card.classList.toggle("hidden", !show);
            if (show) visible++;
          });
          if (noResults) noResults.style.display = visible === 0 ? "block" : "none";
        }

        catBtns.forEach(btn => {
          btn.addEventListener("click", () => {
            catBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeCat = btn.dataset.cat;
            applyFilters();
          });
        });

        monthSelect.addEventListener("change", () => {
          activeMonth = monthSelect.value;
          applyFilters();
        });

        yearSelect.addEventListener("change", () => {
          activeYear = yearSelect.value;
          applyFilters();
        });

        searchInput.addEventListener("input", () => {
          searchTerm = searchInput.value.trim();
          applyFilters();
        });
      })();
    </script>
  </body>
</html>
