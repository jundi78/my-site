
backend:
  name: github
  repo: jundi78/my-site
  branch: main
  base_url: https://sveltia-cms-auth.jundi78.workers.dev

media_folder: "images/uploads"
public_folder: "/images/uploads"
locale: "ar"

collections:
  # ── Site Settings ────────────────────────────────────────
  - name: "settings"
    label: "إعدادات الموقع"
    files:
      - name: "theme"
        label: "المظهر والمحتوى"
        file: "_data/theme.json"
        fields:
          - label: "اسم المدوّنة"
            name: "site_name"
            widget: "string"
            hint: "يظهر في أعلى الصفحة وفي التبويب"

          - label: "الوصف المختصر (تاغلاين)"
            name: "site_tagline"
            widget: "string"
            hint: "جملة قصيرة تصف المدوّنة"

          - label: "العنوان الرئيسي في الصفحة"
            name: "hero_headline"
            widget: "string"
            hint: "الجملة الكبيرة في الصفحة الرئيسية"

          - label: "النص الثانوي في الصفحة"
            name: "hero_subtext"
            widget: "string"
            hint: "الجملة الصغيرة أسفل العنوان الرئيسي"

          # ───────────────────────────────────────────────────
          # Hero article picker
          # القيمة هنا يجب أن تساوي post.fileSlug
          # لأن index.html يحلّ البطل بهذه المقارنة:
          # post.fileSlug == theme.featuredPost
          #
          # إذا كانت القيمة فارغة:
          # سيعود الموقع تلقائيًا إلى أحدث مقال.
          # ───────────────────────────────────────────────────
          - label: "المقالة المميّزة في الواجهة"
            name: "featuredPost"
            widget: "select"
            required: false
            hint: "اختر المقالة التي تريد إظهارها في قسم البطل. إذا تركتها فارغة، سيظهر أحدث مقال تلقائيًا."
            options:
              - { label: "تلقائيًا: أحدث مقال", value: "" }

              - { label: "الأمة المكتئبة (4) - أسباب المرض", value: "الأمة-المكتئبة-4-أسباب-المرض" }

              - { label: "الأمة المكتئبة (3) - أعراض مرضنا", value: "الأمة-المكتئبة-3-أعراض-مرضنا" }

              - { label: "الأمة المكتئبة (2) - هل نحن أمة فعلًا؟", value: "الأمة-المكتئبة-2-هل-نحن-أمة-فعلًا؟" }

              - { label: "يقظان", value: "يقظان" }

              - { label: "الأمة المكتئبة (1) - المقدمة", value: "الأمة-المكتئبة-1-المقدمة" }

              - { label: "الزير", value: "الزير" }

              - { label: "التدوينة الأولى", value: "التدوينة-الأولى" }

              - { label: "عن محمد الجندي وجيله", value: "عن-محمد-الجندي-وجيله" }


          - label: "نص قسم 'عن المدوّنة'"
            name: "about_text"
            widget: "text"

          - label: "نص الفوتر"
            name: "footer_text"
            widget: "string"
            hint: "يظهر في أسفل الصفحة بعد علامة ©"

          - label: "التصنيفات"
            name: "categories"
            widget: "list"
            hint: "أضف أو احذف التصنيفات — ستظهر تلقائيًا في شريط التصفية وفي قائمة التدوينات"
            field:
              label: "تصنيف"
              name: "category"
              widget: "string"

          - label: "السلاسل"
            name: "series"
            widget: "list"
            hint: "أضف أو احذف السلاسل — ستظهر تلقائيًا في الصفحة الرئيسية وفي قائمة التدوينات"
            fields:
              - label: "اسم السلسلة"
                name: "name"
                widget: "string"
                hint: "اسم العرض — يمكن تغييره بحرية دون أن يؤثر على الربط مع التدوينات"

              - label: "المعرّف الداخلي (ID)"
                name: "id"
                widget: "string"
                hint: "معرّف ثابت بالإنجليزية — لا تغيّره بعد إنشائه، مثال: my-series. يُستخدم لربط التدوينات بالسلسلة"

              - label: "وصف مختصر (يظهر في الصفحة الرئيسية)"
                name: "tagline"
                widget: "string"
                required: false
                hint: "جملة قصيرة تظهر أسفل اسم السلسلة في الشريط"

              - label: "الرابط (slug)"
                name: "slug"
                widget: "string"
                hint: "بالإنجليزية بدون مسافات، مثال: my-series. يمكن تغييره (سيغيّر الرابط فقط، ليس الربط مع التدوينات)"

              - label: "صورة الغلاف"
                name: "cover"
                widget: "image"
                required: false

              - label: "وصف السلسلة (SEO)"
                name: "description"
                widget: "string"
                required: false
                hint: "يُستخدم في وصف الصفحة وفي محركات البحث"

              - label: "مقدمة السلسلة"
                name: "intro"
                widget: "text"
                required: false
                hint: "فقرة تظهر أعلى صفحة السلسلة"

          - label: "ألوان"
            name: "colors_group"
            widget: "object"
            collapsed: false
            fields:
              - label: "لون الخلفية"
                name: "color_bg"
                widget: "color"
                enableAlpha: false

              - label: "لون النص الرئيسي"
                name: "color_text"
                widget: "color"
                enableAlpha: false

              - label: "لون النص الثانوي"
                name: "color_muted"
                widget: "color"
                enableAlpha: false

              - label: "لون النص الخافت"
                name: "color_hint"
                widget: "color"
                enableAlpha: false

              - label: "لون الفواصل والحدود"
                name: "color_line"
                widget: "color"
                enableAlpha: false

              - label: "لون الخلفيات الخفيفة"
                name: "color_soft"
                widget: "color"
                enableAlpha: false

              - label: "لون التمييز (الأزرار النشطة)"
                name: "color_accent"
                widget: "color"
                enableAlpha: false

          - label: "الخطوط"
            name: "fonts_group"
            widget: "object"
            collapsed: false
            fields:
              - label: "خط المحتوى (العناوين والنصوص)"
                name: "font_body"
                widget: "select"
                options:
                  - { label: "Amiri (كلاسيكي — افتراضي)", value: "Amiri" }
                  - { label: "Noto Serif Arabic (ناعم)", value: "Noto Serif Arabic" }
                  - { label: "Noto Naskh Arabic (نسخ)", value: "Noto Naskh Arabic" }
                  - { label: "Cairo (عصري)", value: "Cairo" }
                  - { label: "Tajawal (بسيط)", value: "Tajawal" }

              - label: "خط الواجهة (التواريخ والتصنيفات)"
                name: "font_ui"
                widget: "select"
                options:
                  - { label: "IBM Plex Sans Arabic (افتراضي)", value: "IBM Plex Sans Arabic" }
                  - { label: "Noto Naskh Arabic", value: "Noto Naskh Arabic" }
                  - { label: "Cairo", value: "Cairo" }
                  - { label: "Tajawal", value: "Tajawal" }

              - label: "حجم الخط الأساسي (px)"
                name: "font_size_base"
                widget: "number"
                min: 14
                max: 22
                step: 1
                default: 18

          - label: "التخطيط"
            name: "layout_group"
            widget: "object"
            collapsed: false
            fields:
              - label: "أقصى عرض للمحتوى (px)"
                name: "max_width"
                widget: "number"
                min: 600
                max: 1200
                step: 20
                default: 860

              - label: "المسافة بين الأقسام (px)"
                name: "spacing_section"
                widget: "number"
                min: 20
                max: 80
                step: 4
                default: 40

  # ── Posts ────────────────────────────────────────────────
  - name: "posts"
    label: "التدوينات"
    label_singular: "تدوينة"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "posts/{{slug}}.html"
    fields:
      - label: "العنوان"
        name: "title"
        widget: "string"

      - label: "التاريخ"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "التصنيف"
        name: "category"
        widget: "select"
        required: false
        options:

          - { label: "سياسة", value: "سياسة" }

          - { label: "دين", value: "دين" }

          - { label: "علوم", value: "علوم" }

          - { label: "تاريخ", value: "تاريخ" }

          - { label: "متفرقات", value: "متفرقات" }

          - { label: "من أنا", value: "من أنا" }


      - label: "السلسلة"
        name: "series"
        widget: "select"
        required: false
        options:

          - { label: "الأمة المكتئبة", value: "الأمة المكتئبة" }


      - label: "ترتيب الفصل"
        name: "seriesOrder"
        widget: "number"
        required: false
        value_type: "int"
        min: 1

      - label: "معرّف السلسلة (series_id)"
        name: "series_id"
        widget: "select"
        required: false
        hint: "اختر السلسلة التي تنتمي إليها هذه التدوينة — هذا هو الرابط الفعلي الثابت"
        options:

          - { label: "الأمة المكتئبة", value: "alamt-almktybt" }


      - label: "صورة مصغّرة"
        name: "thumbnail"
        widget: "image"
        required: false
        hint: "صورة تظهر في قائمة التدوينات وأعلى المقال"

      - label: "وصف قصير"
        name: "description"
        widget: "string"
        hint: "جملة أو جملتان تظهران في قائمة التدوينات"

      - label: "المحتوى"
        name: "body"
        widget: "markdown"

      - label: "مسودة"
        name: "draft"
        widget: "boolean"
        default: false
        label_singular: "مسودة (لن تظهر للزوار)"
